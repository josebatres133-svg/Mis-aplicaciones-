<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaria IA - Servicios de Limpieza</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }
        
        /* BARRA DE NAVEGACIÓN */
        .navbar {
            background: #0a0a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #2a9aff;
            position: sticky;
            top: 0;
            z-index: 2000;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .navbar a {
            color: #b0b0b0;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .navbar a.active {
            background: #2a5298;
            color: white;
            box-shadow: 0 4px 10px rgba(42, 82, 152, 0.5);
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
            text-align: center;
        }
        
        /* SECCIÓN DE CONFIGURACIÓN COLAPSABLE */
        .config-wrapper {
            max-width: 1600px;
            width: calc(100% - 30px);
            margin: 10px auto;
        }
        .config-toggle {
            background: rgba(42, 82, 152, 0.2);
            color: #2a9aff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85em;
            border: 1px solid #2a9aff;
            margin-bottom: 5px;
        }
        .config-section {
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #2a9aff;
            padding: 15px;
            border-radius: 10px;
            display: none; /* Oculto por defecto */
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .config-section.active { display: grid; }

        .api-key-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .api-key-group label { color: #2a9aff; font-weight: bold; font-size: 0.9em;}
        .api-key-group input { 
            padding: 10px;
            border: 1px solid #333;
            background: rgba(40, 40, 60, 0.9);
            color: #e0e0e0;
            border-radius: 6px;
        }
        
        .btn-google {
            background: white;
            color: #444;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }
        .btn-google.connected { background: #64c864; color: white; }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            padding: 15px;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #2a5298;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 600px;
            max-height: 80vh;
        }
        .panel h2 {
            color: #2a9aff;
            margin-bottom: 12px;
            font-size: 1.1em;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        /* CHAT */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(10, 10, 30, 0.8);
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            line-height: 1.4;
            font-size: 0.9em;
            max-width: 85%;
            white-space: pre-wrap;
        }
        .message.user { background: rgba(42, 82, 152, 0.3); color: #e0e0e0; align-self: flex-end; border-right: 3px solid #2a5298; }
        .message.assistant { background: rgba(60, 100, 180, 0.2); border-left: 3px solid #2a9aff; color: #b0d0ff; align-self: flex-start; }
        .message.system { background: rgba(100, 150, 80, 0.1); border-left: 3px solid #64c864; color: #64c864; font-size: 0.8em; align-self: center; text-align: center; width: 90%; margin: 5px 0; }
        
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #333; background: rgba(40, 40, 60, 0.9); color: #e0e0e0; border-radius: 6px; }
        .input-group button { padding: 10px 20px; background: linear-gradient(135deg, #2a5298 0%, #2a9aff 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        /* LISTAS Y TABS */
        .scrollable { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; flex: 1; padding-right: 5px;}
        .item-card { background: rgba(40, 40, 60, 0.9); border: 1px solid #333; border-radius: 6px; padding: 10px; font-size: 0.9em; }
        .client-item.active { background: rgba(42, 82, 152, 0.3); border-color: #2a9aff; }
        .item-title { color: #2a9aff; font-weight: 600; }
        .item-sub { color: #888; font-size: 0.85em; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { padding: 6px 10px; background: transparent; color: #888; border: none; cursor: pointer; font-weight: 600; font-size: 0.85em; }
        .tab-btn.active { color: #2a9aff; border-bottom: 2px solid #2a9aff; }
        .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* CALCULADORA */
        .calc-section { background: rgba(30, 30, 50, 0.8); border: 1px solid #444; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .calc-title { color: #2a9aff; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed #444; }
        .calc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85em; }
        .calc-row input[type="number"] { width: 50px; padding: 4px; background: #000; border: 1px solid #555; color: white; border-radius: 4px; }
        .calc-total-box { background: rgba(42, 82, 152, 0.3); border: 1px solid #2a9aff; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .calc-total-amount { color: white; font-size: 2em; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(20, 20, 40, 0.95); border: 2px solid #2a5298; border-radius: 10px; padding: 20px; width: 90%; max-width: 500px; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    
    <nav class="navbar">
        <a href="index.html" class="active">💼 Secretaria IA</a>
        <a href="futuro.html">🌍 Mundos Paralelos</a>
    </nav>

    <div class="header">
        <h1>📋 Secretaria IA Profesional</h1>
        <p>Sincronizada con Google Calendar</p>
    </div>

    <div class="config-wrapper">
        <div class="config-toggle" onclick="toggleConfig()">⚙️ Configuración de llaves (API/Google)</div>
        <div class="config-section" id="configPanel">
            <div class="api-key-group">
                <label>🔑 API Key de Gemini:</label>
                <input type="password" id="geminiApiKey" onchange="saveKeys()" placeholder="Tu llave de Gemini...">
            </div>
            <div class="api-key-group">
                <label>📅 Client ID de Google:</label>
                <input type="password" id="googleClientId" onchange="saveKeys()" placeholder="Tu Client ID...">
                <button class="btn-google" id="btnConnectGoogle" onclick="connectGoogleCalendar()">Conectar Calendar</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>👥 Clientes</h2>
            <div class="scrollable" id="clientsList"></div>
            <button style="width:100%; padding:10px; margin-top:10px; background:#2a9aff; color:white; border:none; border-radius:5px;" onclick="openAddClientModal()">+ Nuevo Cliente</button>
        </div>

        <div class="panel">
            <h2>💬 Chat con la IA</h2>
            <div class="chat-container">
                <div class="messages" id="messages"></div>
                <div class="input-group">
                    <input type="text" id="userInput" placeholder="Ej: 'Cotiza una limpieza'..." onkeypress="if(event.key=='Enter') sendMessage()">
                    <button onclick="sendMessage()" id="sendBtn">Enviar</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tasks')">Tareas</button>
                <button class="tab-btn" onclick="switchTab('meetings')">Citas</button>
                <button class="tab-btn" onclick="switchTab('calculator')">Cotizador</button>
            </div>
            
            <div id="tasks" class="tab-content active"><div class="scrollable" id="tasksList"></div></div>
            <div id="meetings" class="tab-content"><div class="scrollable" id="meetingsList"></div></div>
            <div id="calculator" class="tab-content">
                <form id="calcForm" class="scrollable">
                    <div class="calc-section">
                        <div class="calc-title">🏠 Áreas (+$25)</div>
                        <div class="calc-row"><label>Cuartos</label><input type="number" id="calc_dormitorios" min="0" value="0"></div>
                        <div class="calc-row"><label>Baños</label><input type="number" id="calc_banos" min="0" value="0"></div>
                    </div>
                    <div class="calc-total-box">
                        <div class="calc-total-amount" id="calc_resultado">$0.00</div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="addClientModal">
        <div class="modal-content">
            <h3>Nuevo Cliente</h3><br>
            <input type="text" id="clientName" placeholder="Nombre" style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <button onclick="saveClient()" style="padding:10px; background:#2a9aff; color:white; border:none;">Guardar</button>
            <button onclick="closeAddClientModal()" style="padding:10px; background:#666; color:white; border:none;">Cerrar</button>
        </div>
    </div>

    <script>
        let clients = []; let tasks = []; let meetings = []; let currentClient = null; let googleAccessToken = null; let tokenClient;

        window.addEventListener('load', () => {
            const savedGemini = localStorage.getItem('geminiApiKeySecretary');
            const savedGoogle = localStorage.getItem('googleClientId');
            
            if (savedGemini) document.getElementById('geminiApiKey').value = savedGemini;
            if (savedGoogle) {
                document.getElementById('googleClientId').value = savedGoogle;
                // Si ya hay llaves, ocultamos el panel para que se vea limpio
                document.getElementById('configPanel').style.display = 'none';
                initGoogleSilencioso(savedGoogle);
            } else {
                // Si no hay llaves, mostramos el panel para que las ponga
                document.getElementById('configPanel').style.display = 'grid';
            }

            loadData(); renderClients(); renderTasks(); renderMeetings();
            addSystemMessage("🤖 Sistema listo. Conectando con tus preferencias...");
        });

        function toggleConfig() {
            const p = document.getElementById('configPanel');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function saveKeys() {
            localStorage.setItem('geminiApiKeySecretary', document.getElementById('geminiApiKey').value.trim());
            localStorage.setItem('googleClientId', document.getElementById('googleClientId').value.trim());
        }

        function initGoogleSilencioso(clientId) {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: clientId, scope: 'https://www.googleapis.com/auth/calendar.events',
                    callback: (response) => {
                        if (response.error) return;
                        googleAccessToken = response.access_token;
                        document.getElementById('btnConnectGoogle').innerHTML = "✅ Calendar Conectado";
                        document.getElementById('btnConnectGoogle').classList.add('connected');
                    },
                });
                tokenClient.requestAccessToken({prompt: ''}); 
            } catch (e) {}
        }

        function connectGoogleCalendar() {
            const clientId = document.getElementById('googleClientId').value.trim();
            if (!clientId) return alert("Pon tu Client ID primero.");
            saveKeys();
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: clientId, scope: 'https://www.googleapis.com/auth/calendar.events',
                callback: (response) => {
                    googleAccessToken = response.access_token;
                    document.getElementById('btnConnectGoogle').innerHTML = "✅ Calendar Conectado";
                    document.getElementById('btnConnectGoogle').classList.add('connected');
                    addSystemMessage("✅ ¡Google Calendar vinculado correctamente!");
                },
            });
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function createEventInGoogleCalendar(title, dateStr) {
            if (!googleAccessToken) return false;
            const start = new Date(dateStr);
            const end = new Date(start.getTime() + (60*60*1000));
            const event = {
                'summary': title,
                'start': { 'dateTime': start.toISOString(), 'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone },
                'end': { 'dateTime': end.toISOString(), 'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone }
            };
            const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                method: 'POST', headers: { 'Authorization': `Bearer ${googleAccessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(event)
            });
            return response.ok;
        }

        function saveData() {
            localStorage.setItem('sec_clients_final', JSON.stringify(clients));
            localStorage.setItem('sec_tasks_final', JSON.stringify(tasks));
            localStorage.setItem('sec_meetings_final', JSON.stringify(meetings));
        }

        function loadData() {
            clients = JSON.parse(localStorage.getItem('sec_clients_final') || '[]');
            tasks = JSON.parse(localStorage.getItem('sec_tasks_final') || '[]');
            meetings = JSON.parse(localStorage.getItem('sec_meetings_final') || '[]');
        }

        function renderClients() {
            const list = document.getElementById('clientsList');
            list.innerHTML = clients.map((c, i) => `
                <div class="item-card client-item ${currentClient === i ? 'active' : ''}" onclick="selectClient(${i})">
                    <div class="item-title">${c.name}</div>
                </div>`).join('') || '<p style="font-size:0.8em; color:#666;">Sin clientes registrados.</p>';
        }

        function selectClient(i) { currentClient = i; renderClients(); addSystemMessage(`👤 Cliente enfocado: ${clients[i].name}`); }
        function openAddClientModal() { document.getElementById('addClientModal').classList.add('active'); }
        function closeAddClientModal() { document.getElementById('addClientModal').classList.remove('active'); }
        function saveClient() {
            const n = document.getElementById('clientName').value; if(!n) return;
            clients.push({name: n}); saveData(); renderClients(); closeAddClientModal();
        }

        function renderTasks() {
            document.getElementById('tasksList').innerHTML = tasks.filter(t=>!t.completed).map((t, i) => `
                <div class="item-card">
                    <div class="item-title">${t.title}</div>
                    <div class="item-sub">${t.clientName}</div>
                </div>`).join('') || '<p style="font-size:0.8em; color:#666;">No hay tareas pendientes.</p>';
        }

        function renderMeetings() {
            document.getElementById('meetingsList').innerHTML = meetings.map(m => `
                <div class="item-card">
                    <div class="item-title">${m.title}</div>
                    <div class="item-sub">${new Date(m.date).toLocaleString()}</div>
                </div>`).join('') || '<p style="font-size:0.8em; color:#666;">Agenda vacía.</p>';
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
        }

        function addSystemMessage(t) { const m = document.getElementById('messages'); m.innerHTML += `<div class="message system">${t}</div>`; m.scrollTop = m.scrollHeight; }
        function addUserMessage(t) { const m = document.getElementById('messages'); m.innerHTML += `<div class="message user">${t}</div>`; m.scrollTop = m.scrollHeight; }
        function addAssistantMessage(t) { const m = document.getElementById('messages'); m.innerHTML += `<div class="message assistant">${t}</div>`; m.scrollTop = m.scrollHeight; }

        async function sendMessage() {
            const gemini = document.getElementById('geminiApiKey').value.trim();
            if(!gemini) return addSystemMessage("⚠️ Pon tu API Key de Gemini en configuración.");
            
            const input = document.getElementById('userInput');
            const text = input.value.trim(); if(!text) return;
            addUserMessage(text); input.value = '';

            const system = `Eres una Secretaria de limpieza. Cliente: ${currentClient !== null ? clients[currentClient].name : 'Ninguno'}.
            Si agendan, responde con JSON al final: {"accion": "cita", "titulo": "Limpieza", "fecha_iso": "YYYY-MM-DDTHH:MM:SS"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gemini}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }], systemInstruction: { parts: [{ text: system }] } })
                });
                const data = await response.json();
                let reply = data.candidates[0].content.parts[0].text;
                const jsonMatch = reply.match(/\{.*\}/);
                if (jsonMatch) {
                    reply = reply.replace(jsonMatch[0], '').trim();
                    const action = JSON.parse(jsonMatch[0]);
                    if(action.accion === 'cita') {
                        meetings.push({title: action.titulo, date: action.fecha_iso});
                        saveData(); renderMeetings();
                        if(googleAccessToken) await createEventInGoogleCalendar(action.titulo, action.fecha_iso);
                        addSystemMessage("📅 Cita registrada automáticamente.");
                    }
                }
                addAssistantMessage(reply);
            } catch (e) { addSystemMessage("❌ Error conectando con la IA."); }
        }
    </script>
</body>
</html>
